name: Validate translations

on:
  pull_request:
    paths:
      - "IL2-SR-Client/Localization/**"
      - "scripts/Validate-ResxTranslations.ps1"
      - ".github/workflows/validate-translations.yml"
  push:
    paths:
      - "IL2-SR-Client/Localization/**"
      - "scripts/Validate-ResxTranslations.ps1"
      - ".github/workflows/validate-translations.yml"

jobs:
  validate-resx:
    name: Validate RESX files
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate RESX translations
        shell: pwsh
        run: ./scripts/Validate-ResxTranslations.ps1
